name: 案件案内メールの自動送信（15:40 JST）

# 日次マッチ（15:00 JST）の後に実行。商流OK・80点以上・「今日の案件 or 今日の人材」・未送信を自動送信。
# ON/OFF と 1日上限は設定画面（組織設定）で制御。OFF なら何も送らない。
# 日本時間 15:40（= 6:40 UTC）。手動実行では cap を上書きできる（cap=0 は無制限）。
on:
  schedule:
    - cron: "40 6 * * *"
  workflow_dispatch:
    inputs:
      cap:
        description: "今回だけの送信上限の上書き（空=設定どおり / 0=無制限）"
        required: false
        default: ""

concurrency:
  group: auto-send
  cancel-in-progress: false

jobs:
  auto-send:
    runs-on: ubuntu-latest
    steps:
      - name: 自動送信を実行
        run: |
          url="https://sesmatch.encore-biz.com/api/cron/auto-send"
          cap="${{ github.event.inputs.cap }}"
          if [ -n "$cap" ]; then url="$url?cap=$cap"; fi
          resp=$(curl -fsS --max-time 300 -X POST "$url" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
          echo "$resp"
