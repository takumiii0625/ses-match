name: 提携先への一斉案内メール送信（手動ドレイン）

# 一斉案内キャンペーンの送信待ち(QUEUED/SENDING)を分割送信する。
# 送信はアプリ側（/api/blast 実行時）に即ドレインするため、通常このワークフローは不要。
# 大量送信で途中終了した残り(PENDING)を流し切る「手動の保険」として残す（5分cronは廃止＝空回り課金防止）。
on:
  workflow_dispatch: {} # 手動実行のみ

concurrency:
  group: blast-send
  cancel-in-progress: false

jobs:
  blast-send:
    runs-on: ubuntu-latest
    steps:
      - name: 送信待ちを分割ドレイン（完了までループ）
        run: |
          for i in $(seq 1 20); do
            resp=$(curl -fsS --max-time 300 -X POST \
              "https://sesmatch.encore-biz.com/api/cron/blast-send?maxToSend=500" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
            echo "$resp"
            echo "$resp" | grep -q '"done":true' && { echo "完了/対象なし"; break; }
          done
