name: 定時マッチ（11/15/17時 JST・今日のみ）

# 定時マッチは取込（11/15/17時）の直後に毎回実行（取込で増えた当日分を反映するため）。
# 取込は数分かかるので15分ずらす。各回 offset=0 でクリーン再生成（当日分を作り直す）。
# 手動(workflow_dispatch)は days(対象期間) と startOffset(再開位置)を指定可。
# 時刻(UTC→JST): 02:15→11:15, 06:15→15:15, 08:15→17:15
on:
  schedule:
    - cron: "15 2,6,8 * * *" # JST 11:15 / 15:15 / 17:15（取込の直後）
  workflow_dispatch:
    inputs:
      days:
        description: "対象とする配信日の幅（1=今日のみ。再マッチ範囲を広げる時に3や7）"
        required: false
        default: "1"
      startOffset:
        description: "再開位置（0=先頭・クリーン再生成あり。途中再開時は前回の処理済み件数を指定）"
        required: false
        default: "0"

concurrency:
  group: rematch-daily
  cancel-in-progress: false

jobs:
  rematch:
    runs-on: ubuntu-latest
    steps:
      - name: マッチを実行（完了までページループ・遅いページはスキップして継続）
        run: |
          # 定時は1日3回（11/15/17時）とも実行する＝daily ガードは付けない。
          # 各回 offset=0・days=1 で「当日分」をクリーン再生成する。
          if [ "${{ github.event_name }}" = "schedule" ]; then
            days=1; guard=""; offset=0
          else
            days="${{ github.event.inputs.days }}"; guard=""; offset="${{ github.event.inputs.startOffset }}"
          fi
          for i in $(seq 1 1000); do
            resp=$(curl -fsS --max-time 290 -X POST \
              "https://sesmatch.encore-biz.com/api/cron/rematch?offset=$offset&limit=3&scope=all&days=$days$guard" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" || true)
            if [ -z "$resp" ]; then
              echo "page failed at offset=$offset — skip ahead"
              offset=$((offset + 3))
              continue
            fi
            echo "$resp"
            echo "$resp" | grep -q '"done":true' && { echo "完了/本日処理済み"; break; }
            next=$(echo "$resp" | grep -o '"processed":[0-9]*' | grep -o '[0-9]*')
            if [ -z "$next" ] || [ "$next" = "$offset" ]; then offset=$((offset + 3)); else offset=$next; fi
          done
