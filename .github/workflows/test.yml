name: テスト（型チェック＋ユニットテスト）

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # postinstall の prisma generate は schema があれば DB 不要で動く。
      - name: 依存インストール
        run: pnpm install --frozen-lockfile

      - name: 型チェック
        run: pnpm exec tsc --noEmit -p tsconfig.json

      - name: ユニットテスト
        run: pnpm test
