name: メール自動取込（11/14/17時 JST）

# 自動取込の唯一のスケジューラ（Vercel cron は重複のため停止＝vercel.json crons:[]）。
# 日本時間 11:00 / 14:00 / 17:00 に実行。
# JST = UTC+9 なので、11/14/17時 JST = 2/5/8時 UTC。
# GitHub のスケジュールは数分前後する場合があります（仕様）。
on:
  # 一時停止: 取込後の自動マッチが高流量で爆発し課金が大きいため、スケジュールを無効化。
  # 取込とマッチを分離（取込のみ自動化＋マッチは制御）してから再開する。
  # schedule:
  #   - cron: "0 2,5,8 * * *"
  workflow_dispatch: {} # 手動実行のみ（自動は停止中）

concurrency:
  group: fetch-mail
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 取り込みエンドポイントを呼び出す（ページ方式で完了までループ）
        run: |
          token=""
          for i in $(seq 1 500); do
            url="https://sesmatch.encore-biz.com/api/cron/fetch-mail?pageSize=10"
            [ -n "$token" ] && url="$url&pageToken=$token"
            resp=$(curl -fsS --max-time 300 -X POST "$url" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}")
            echo "$resp"
            echo "$resp" | grep -q '"done":true' && { echo "完了"; break; }
            token=$(echo "$resp" | grep -o '"nextPageToken":"[^"]*"' | sed 's/.*:"//;s/"//')
            [ -z "$token" ] && { echo "次ページなし"; break; }
          done
