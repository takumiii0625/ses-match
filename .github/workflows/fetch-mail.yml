name: メール自動取込（11/15/17時 JST）

# 自動取込の唯一のスケジューラ（Vercel cron は重複のため停止＝vercel.json crons:[]）。
# 日本時間 11:00 / 15:00 / 17:00 に実行。
# JST = UTC+9 なので、11/15/17時 JST = 2/6/8時 UTC。
# GitHub のスケジュールは数分前後する場合があります（仕様）。
on:
  # 取込は分類・登録のみ（自動マッチはしない＝安価）。マッチは rematch-daily が取込直後に実行。
  schedule:
    - cron: "0 2,6,8 * * *" # JST 11/15/17
  workflow_dispatch:
    inputs:
      days:
        description: "取得期間（日）。空=今日のみ。取りこぼし回収時に 2〜3 を指定（既取込は自動スキップ）"
        required: false
        default: ""

concurrency:
  group: fetch-mail
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 取り込みエンドポイントを呼び出す（ページ方式で完了までループ・エラー耐性あり）
        run: |
          token=""
          days="${{ github.event.inputs.days }}"
          fails=0
          for i in $(seq 1 800); do
            url="https://sesmatch.encore-biz.com/api/cron/fetch-mail?pageSize=5"
            [ -n "$days" ] && url="$url&days=$days"
            [ -n "$token" ] && url="$url&pageToken=$token"
            # -f を外し || true で、1ページの500等でワークフロー全体を止めない。
            resp=$(curl -sS --max-time 300 -X POST "$url" \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" || true)
            if [ -z "$resp" ] || ! echo "$resp" | grep -q '"fetched"'; then
              fails=$((fails + 1))
              echo "page error ($fails/5) — retry: $resp"
              if [ "$fails" -ge 5 ]; then echo "連続エラーで打ち切り（残りは次回・再実行で続きから）"; break; fi
              sleep 15
              continue
            fi
            fails=0
            echo "$resp"
            echo "$resp" | grep -q '"done":true' && { echo "完了"; break; }
            token=$(echo "$resp" | grep -o '"nextPageToken":"[^"]*"' | sed 's/.*:"//;s/"//')
            [ -z "$token" ] && { echo "次ページなし"; break; }
          done
