name: メール自動取込（11/14/17時 JST）

# 日本時間 11:00 / 14:00 / 17:00 に実行。
# JST = UTC+9 なので、11/14/17時 JST = 2/5/8時 UTC。
# GitHub のスケジュールは数分前後する場合があります（仕様）。
on:
  schedule:
    - cron: "0 2,5,8 * * *"
  workflow_dispatch: {} # 手動実行も可

concurrency:
  group: fetch-mail
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 取り込みエンドポイントを呼び出す
        run: |
          curl -fsS --max-time 300 -X POST \
            "https://sesmatch.encore-biz.com/api/cron/fetch-mail?limit=200" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n"
